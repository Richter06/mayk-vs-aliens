<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="github/alienIcon.png" type="image/x-icon">
    <title>Mayk VS Aliens</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #introVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: auto;
            height: 85vh;

            max-width: 100vw;
            max-height: 100vh;

            object-fit: contain;

            z-index: 10;
        }

        #game {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #skipBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid white;
            cursor: pointer;
        }
    </style>


</head>

<body>
    <button id="skipBtn">Pular</button>
    <video id="introVideo" autoplay muted>
        <source src="administrador.mp4" type="video/mp4">
    </video>

    <canvas id="game"></canvas>

    <script src="mayk.js"></script>
</body>

</html>
